<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:30px;
}
.container{
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:8px;
    padding:30px;
}
.header{
    text-align:center;
    margin-bottom:20px;
}
.logo{
    width:120px;
}
.title{
    font-size:22px;
    font-weight:bold;
}
.content{
    margin-top:20px;
    font-size:16px;
}
.badge{
    padding:8px 14px;
    border-radius:6px;
    color:white;
    font-weight:bold;
}
.accepted{background:#28a745;}
.rejected{background:#dc3545;}
.pending{background:#ffc107;color:black;}
.withdraw{background:#6c757d;}
.footer{
    margin-top:30px;
    font-size:12px;
    color:#888;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

{% block content %}
{% endblock %}

<div class="footer">
Volunteer Platform © {{ year }}
</div>

</div>

</body>
</html>
