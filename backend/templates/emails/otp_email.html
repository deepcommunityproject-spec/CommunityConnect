<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Your Password</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background-color: #f9f9f9;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #764ba2;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header h2 {
            color: #764ba2;
            margin: 0;
        }
        .otp-box {
            background-color: #fff;
            border: 2px dashed #667eea;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            letter-spacing: 5px;
            color: #764ba2;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Volunteer Platform</h2>
        </div>
        <p>Hello,</p>
        <p>You requested a password reset for your account. Please use the following One-Time Password (OTP) to proceed:</p>
        <div class="otp-box">
            {{ otp }}
        </div>
        <p>This code is valid for <strong>5 minutes</strong>. If you did not request this, please ignore this email.</p>
        <div class="footer">
            &copy; 2026 Volunteer Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
